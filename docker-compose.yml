version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: seapedia-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: seapedia_root_2026
      MYSQL_DATABASE: seapedia
      MYSQL_USER: seapedia_user
      MYSQL_PASSWORD: seapedia_pass_2026
    ports:
      - "3306:3306"
    volumes:
      - seapedia_mysql_data:/var/lib/mysql
      - ./backend/src/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:z
      - ./backend/src/database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:z
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pseapedia_root_2026"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: seapedia-phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: seapedia_user
      PMA_PASSWORD: seapedia_pass_2026
    ports:
      - "8080:80"

volumes:
  seapedia_mysql_data:
    driver: local
